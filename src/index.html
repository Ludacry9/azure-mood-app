<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood AI Generator</title>
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-md w-full bg-slate-800 p-8 rounded-2xl shadow-xl border border-slate-700 text-center">
        <h1 class="text-3xl font-extrabold mb-2 bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
            Come ti senti oggi?
        </h1>
        <p class="text-slate-400 text-sm mb-6">Inserisci il tuo mood e lascia che l'AI faccia il resto.</p>

        <input type="text" id="moodInput" placeholder="Es. Felice, stressato, malinconico..." 
            class="w-full px-4 py-3 rounded-lg bg-slate-700 border border-slate-600 text-white placeholder-slate-400 focus:outline-none focus:border-cyan-500 mb-4 transition-all">

        <button id="generateBtn" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-all shadow-md transform active:scale-95 cursor-pointer">
            Genera Ispirazione ✨
        </button>

        <div id="loader" class="hidden mt-6 text-cyan-400 animate-pulse text-sm font-medium">
            Sto consultando le stelle (e l'AI)... 🌌
        </div>

        <div id="resultContainer" class="hidden mt-6 p-4 rounded-xl bg-slate-700/50 border border-slate-600/50 text-left">
            <p id="resultText" class="text-lg italic text-slate-200 whitespace-pre-line"></p>
        </div>
    </div>

    <script>
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const mood = document.getElementById('moodInput').value.trim();
            if (!mood) return alert('Scrivi come ti senti prima!');

            const loader = document.getElementById('loader');
            const resultContainer = document.getElementById('resultContainer');
            const resultText = document.getElementById('resultText');

            loader.classList.remove('hidden');
            resultContainer.classList.add('hidden');

            try {
                const response = await fetch(`/api/GetMoodInspiration?mood=${encodeURIComponent(mood)}`);
                const data = await response.json();

                resultText.innerText = data.text || "Ops, qualcosa è stato bloccato.";
                resultContainer.classList.remove('hidden');
            } catch (error) {
                console.error(error);
                alert("Errore di connessione con il backend.");
            } finally {
                loader.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
