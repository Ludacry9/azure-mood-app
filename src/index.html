<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood AI - Oasi di Ispirazione</title>
    <!-- Tailwind per lo stile neon/moderno -->
    <script src="https://jsdelivr.net"></script>
    <!-- Vue 3 da CDN per avere un vero framework reattivo senza installare nulla -->
    <script src="https://unpkg.com"></script>
    <!-- Font e Icone -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#0b0f19] text-slate-100 min-h-screen flex items-center justify-center p-4 relative overflow-x-hidden">
    
    <!-- Sfondi sfumati decorativi in stile Cloud moderno -->
    <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-cyan-500/10 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-violet-500/10 rounded-full blur-[120px] pointer-events-none"></div>

    <div id="app" class="max-w-xl w-full bg-slate-900/60 backdrop-blur-xl p-8 rounded-3xl shadow-2xl border border-slate-800 text-center relative z-10 transition-all duration-500">
        
        <!-- Header -->
        <header class="mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-cyan-500 to-violet-600 shadow-lg shadow-cyan-500/20 mb-4 transform hover:rotate-12 transition-transform duration-300">
                <i class="fa-solid fa-sparkles text-2xl text-white"></i>
            </div>
            <h1 class="text-4xl font-extrabold bg-gradient-to-r from-cyan-400 via-teal-300 to-violet-400 bg-clip-text text-transparent tracking-tight">
                Mood AI Oasis
            </h1>
            <p class="text-slate-400 mt-2 text-base">Inietta le tue emozioni, estrai pura poesia.</p>
        </header>

        <!-- Selettore di Mood Rapidi (Bottoni interattivi) -->
        <div class="mb-6">
            <label class="block text-left text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Mood suggeriti</label>
            <div class="flex flex-wrap gap-2 justify-start">
                <button v-for="suggestion in quickMoods" :key="suggestion.text"
                    @click="setMood(suggestion.text)"
                    class="px-4 py-2 text-sm rounded-xl bg-slate-800/40 border border-slate-700/50 hover:border-cyan-500/50 hover:bg-slate-800 text-slate-300 transition-all cursor-pointer flex items-center gap-2 transform active:scale-95">
                    <span>{{ suggestion.emoji }}</span> {{ suggestion.text }}
                </button>
            </div>
        </div>

        <!-- Box Input -->
        <div class="relative mb-6">
            <input type="text" v-model="mood" @keyup.enter="generateInspiration"
                placeholder="Oppure descrivi qui come ti senti nei dettagli..." 
                class="w-full px-5 py-4 pl-12 rounded-2xl bg-slate-950/50 border border-slate-800 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500/80 focus:ring-2 focus:ring-cyan-500/20 transition-all text-base shadow-inner">
            <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">
                <i class="fa-solid fa-face-smile-wink text-lg"></i>
            </div>
        </div>

        <!-- Pulsante di Azione -->
        <button @click="generateInspiration" :disabled="loading"
            class="w-full bg-gradient-to-r from-cyan-500 via-blue-600 to-violet-600 hover:opacity-95 text-white font-bold py-4 px-6 rounded-2xl transition-all shadow-xl shadow-cyan-950/50 transform active:scale-[0.98] disabled:opacity-50 disabled:scale-100 flex items-center justify-center gap-3 cursor-pointer text-base tracking-wide">
            <span v-if="loading" class="animate-spin inline-block w-5 h-5 border-2 border-white border-t-transparent rounded-full"></span>
            <span v-else><i class="fa-solid fa-wand-magic-sparkles"></i></span>
            {{ loading ? 'Sto interrogando le costellazioni...' : 'Genera Magia ✨' }}
        </button>

        <!-- Sezione Risultato Reattiva -->
        <transition name="fade">
            <div v-if="result" class="mt-8 text-left border-t border-slate-800/60 pt-6">
                <div class="bg-gradient-to-b from-slate-950/40 to-slate-950/10 border border-slate-800/50 p-6 rounded-2xl relative overflow-hidden shadow-2xl">
                    <div class="absolute top-3 right-4 text-xs font-semibold text-cyan-500/30 uppercase tracking-widest">Phi-4 Response</div>
                    <i class="fa-solid fa-quote-left text-3xl text-cyan-500/10 absolute top-4 left-4"></i>
                    <p class="text-xl italic text-cyan-100/90 leading-relaxed whitespace-pre-line relative z-10 pl-6 pr-2 font-light">
                        {{ result }}
                    </p>
                </div>
            </div>
        </transition>

    </div>

    <!-- Semplice animazione CSS di transizione per Vue -->
    <style>
        .fade-enter-active, .fade-leave-active { transition: opacity 0.5s ease, transform 0.5s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; transform: translateY(15px); }
    </style>

    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                const mood = ref('');
                const result = ref('');
                const loading = ref(false);

                const quickMoods = [
                    { text: 'Carico di energia', emoji: '🚀' },
                    { text: 'Un po\' malinconico', emoji: '🌧️' },
                    { text: 'Stressato dal codice', emoji: '💻' },
                    { text: 'In cerca di pace', emoji: '☕' },
                    { text: 'Felice ed euforico', emoji: '☀️' }
                ];

                const setMood = (text) => {
                    mood.value = text;
                };

                const generateInspiration = async () => {
                    if (!mood.value.trim()) return alert('Inserisci il tuo stato d\'animo prima di lanciare l'incantesimo!');
                    
                    loading.value = true;
                    result.value = '';

                    try {
                        const response = await fetch(`/api/GetMoodInspiration?mood=${encodeURIComponent(mood.value)}`);
                        const data = await response.json();
                        
                        if (data.error) {
                            result.value = `⚠️ Uh oh, l'AI dice: ${data.error}`;
                        } else {
                            result.value = data.text;
                        }
                    } catch (error) {
                        console.error(error);
                        result.value = "❌ Impossibile connettersi alle API della Azure Function.";
                    } finally {
                        loading.value = false;
                    }
                };

                return { mood, result, loading, quickMoods, setMood, generateInspiration };
            }
        }).mount('#app');
    </script>
</body>
</html>
